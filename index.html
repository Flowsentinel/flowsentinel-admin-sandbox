<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO — admin portal is private, block all crawlers -->
    <title>FlowSentinel — Admin Portal</title>
    <meta name="description" content="FlowSentinel platform administration portal. Manage tenants, licenses, SMTP configuration, and audit logs." />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
    <meta name="author" content="FlowSentinel" />

    <!-- Open Graph (minimal — private portal) -->
    <meta property="og:type"      content="website" />
    <meta property="og:site_name" content="FlowSentinel Admin" />
    <meta property="og:title"     content="FlowSentinel — Admin Portal" />
    <meta property="og:image"     content="https://admin.flowsentinel.cloud/icon.svg" />

    <!-- Twitter Card -->
    <meta name="twitter:card"  content="summary" />
    <meta name="twitter:title" content="FlowSentinel — Admin Portal" />

    <!-- Favicons -->
    <link rel="icon"             type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon"                      href="/icon.svg" />

    <!-- Theme colour -->
    <meta name="theme-color" content="#0d1526" />
    <meta name="msapplication-TileColor" content="#0d1526" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
